apiVersion: apps/v1
kind: Deployment
metadata:
  name: ShoppingCart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ShoppingCart
  template:
    metadata:
      labels:
        app: ShoppingCart
    spec:
      containers:
      - name: ShoppingCart
        image: sabarishselva23/ShoppingCart:latest
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ShoppingCart-service
spec:
  type: NodePort
  selector:
    app: ShoppingCart
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30008
